name: Build Rewire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4.2.2
      
      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'
          
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          
      - name: Install expect and Bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli
          
      - name: Setup Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          
      - name: Generate TWA Project with expect
        run: |
          expect << 'EOF'
            set timeout 60
            spawn bubblewrap init --manifest https://yghari.github.io/rewire-app/manifest.json --directory twa-project
            expect {
              "Do you want to continue?" { send "y\r"; exp_continue }
              "Press any key" { send "\r"; exp_continue }
              eof
            }
          EOF
          
      - name: Build APK with expect
        run: |
          cd twa-project
          expect << 'EOF'
            set timeout 300
            spawn bubblewrap build
            expect {
              "Do you want to continue?" { send "y\r"; exp_continue }
              "Press any key" { send "\r"; exp_continue }
              "BUILD SUCCESSFUL" { }
              eof
            }
          EOF
          
      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rewire-app-apk
          path: |
            twa-project/app/build/outputs/apk/**/*.apk
            twa-project/app-release-unsigned.apk
          if-no-files-found: error
