name: Build Rewire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project (auto-confirm)
        run: |
          echo "" | bubblewrap init \
            --manifest https://yghari.github.io/rewire-app/manifest.json \
            --directory twa-project 2>&1 || true

      - name: Accept SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK (auto-confirm)
        run: |
          cd twa-project
          printf "\n" | bubblewrap build 2>&1
