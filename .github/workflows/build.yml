name: Build Rewire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          bubblewrap init \
            --manifest https://yghari.github.io/rewire-app/manifest.json \
            --directory twa-project
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Accept SDK licenses
        run: |
          cd twa-project
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: rewire-app-apk
          path: |
            twa-project/app-release-unsigned.apk
            twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

