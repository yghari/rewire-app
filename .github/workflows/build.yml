name: Build Rewire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Generate TWA project files
        run: python3 setup_twa.py

      - name: Show project structure
        run: find twa -type f | sort

      - name: Build APK
        run: |
          cd twa
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find APK
        if: always()
        run: find . -name "*.apk" || echo "NO APK FOUND"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rewire-app-apk
          path: twa/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
