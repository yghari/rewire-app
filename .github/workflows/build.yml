name: Build Rewire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4.2.2
      
      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'
          
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          
      - name: Setup Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          
      - name: Generate TWA project with non-interactive flag
        run: |
          npx --yes @bubblewrap/cli init \
            --manifest https://yghari.github.io/rewire-app/manifest.json \
            --directory twa-project \
            --skip-confirmation 2>&1 || \
          echo "y" | npx --yes @bubblewrap/cli init \
            --manifest https://yghari.github.io/rewire-app/manifest.json \
            --directory twa-project
          
      - name: Build with gradle (skip bubblewrap)
        run: |
          cd twa-project
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Pandroid.injected.signing.store.file=/tmp/keystore.jks -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android || \
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rewire-app-apk
          path: |
            twa-project/app/build/outputs/apk/release/*.apk
            twa-project/app/build/outputs/apk/*/*.apk
          if-no-files-found: error
