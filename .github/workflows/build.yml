name: Build Rewire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4.2.2
      
      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'
          
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
        
      - name: Setup Android SDK
        run: |
          # Add Android SDK tools to PATH
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          echo "y" | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          
      - name: Generate TWA Project
        run: |
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo "y" | bubblewrap init \
            --manifest https://yghari.github.io/rewire-app/manifest.json \
            --directory twa-project
            
      - name: Build APK
        run: |
          cd twa-project
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo "y" | bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rewire-app-apk
          path: |
            twa-project/app/build/outputs/apk/**/*.apk
            twa-project/app-release-unsigned.apk
          if-no-files-found: error
